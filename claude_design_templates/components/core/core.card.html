<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-canvas); }
  .grid { display: flex; flex-direction: column; gap: 20px; }
  .block { display: flex; flex-direction: column; gap: 10px; }
  .lbl { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: .12em; text-transform: uppercase; color: var(--text-tertiary); }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, Badge, Tag, Avatar, Card } = window.MedicalAffairsCopilotDesignSystem_2d0005;
  const Mic = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4"/></svg>);

  function Demo() {
    return (
      <div className="grid">
        <div className="block">
          <div className="lbl">Button</div>
          <div className="row">
            <Button variant="primary" iconLeft={<Mic/>}>Start voice session</Button>
            <Button variant="secondary">View evidence</Button>
            <Button variant="ghost">Dismiss</Button>
            <Button variant="danger" size="sm">Revoke</Button>
            <Button variant="primary" size="sm" disabled>Disabled</Button>
          </div>
        </div>

        <div className="block">
          <div className="lbl">Badge — semantic tone</div>
          <div className="row">
            <Badge tone="safe" dot>Validated</Badge>
            <Badge tone="compliance">Citation required</Badge>
            <Badge tone="evidence">12 citations</Badge>
            <Badge tone="risk" dot>Conflict flagged</Badge>
            <Badge tone="accent">Phase 3</Badge>
            <Badge tone="neutral" variant="outline">Pending review</Badge>
          </div>
        </div>

        <div className="block">
          <div className="lbl">Tag — protocol attributes</div>
          <div className="row">
            <Tag label="Phase" value="3" />
            <Tag label="Indication" value="RSV — older adults" />
            <Tag label="Geography" value="US · EU · JP" />
            <Tag label="Specialty" value="Vaccinology" tone="accent" />
          </div>
        </div>

        <div className="block">
          <div className="lbl">Avatar &nbsp;·&nbsp; Card</div>
          <div className="row" style={{ alignItems: 'stretch' }}>
            <Avatar name="Dr. Elena Marchetti" size={40} />
            <Avatar name="Hideo Tanaka" tone="evidence" size={40} />
            <Avatar name="Priya N" tone="neutral" size={40} />
            <Card eyebrow="Expert" title="Dr. Elena Marchetti" style={{ width: 280 }} padding={12}>
              <div style={{ fontSize: 'var(--text-sm)', color: 'var(--text-secondary)' }}>Karolinska Institutet · Vaccinology</div>
            </Card>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>

</html>
