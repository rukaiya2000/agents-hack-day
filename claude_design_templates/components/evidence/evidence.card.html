<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  body { margin: 0; padding: 22px; background: var(--surface-canvas); }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; }
  .lbl { font-family: var(--font-mono); font-size: var(--text-2xs); letter-spacing: .12em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; }
  .sentence { font-size: var(--text-md); color: var(--text-primary); line-height: 1.7; }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
  const { ScoreBar, Citation } = window.MedicalAffairsCopilotDesignSystem_2d0005;
  function Demo() {
    return (
      <div className="wrap">
        <div>
          <div className="lbl">Score breakdown</div>
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            <ScoreBar label="Phase 3 trial experience" value={28} max={30} weight="× 0.30" tone="accent" />
            <ScoreBar label="Publication relevance" value={24} max={25} tone="evidence" />
            <ScoreBar label="Guideline authorship" value={16} max={20} tone="safe" />
            <ScoreBar label="Recency of activity" value={9} max={15} tone="neutral" />
          </div>
        </div>
        <div>
          <div className="lbl">Citations</div>
          <p className="sentence">RSV prefusion-F immunogenicity in adults ≥60 is well established <Citation compact refId="1" /> and supported by Phase 3 efficacy data <Citation compact refId="2" />.</p>
          <div style={{ marginTop: 14 }}>
            <Citation refId="NEJM '24"
              title="Efficacy of a bivalent RSV prefusion F vaccine in older adults"
              source="N Engl J Med" year="2024"
              relevance="Directly supports the protocol's primary immunogenicity endpoint." />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
