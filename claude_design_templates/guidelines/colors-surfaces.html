<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces & borders" subtitle="Off-white canvas, white cards, sunken wells, two border weights." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-canvas); }
  .row { display: flex; gap: 14px; align-items: stretch; }
  .demo { flex: 1; padding: 14px; border-radius: var(--radius-md); }
  .name { font-size: var(--text-sm); font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-tertiary); margin-top: 3px; }
  .stack { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .borderbox { height: 30px; border-radius: var(--radius-sm); background: var(--surface-card); display: flex; align-items: center; padding: 0 10px; }
  .lbl { font-size: var(--text-xs); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="demo" style="background:var(--surface-canvas);border:1px solid var(--border-subtle)">
      <div class="name">Canvas</div><div class="val">--surface-canvas</div>
    </div>
    <div class="demo" style="background:var(--surface-card);border:1px solid var(--border-subtle);box-shadow:var(--shadow-sm)">
      <div class="name">Card</div><div class="val">--surface-card</div>
    </div>
    <div class="demo" style="background:var(--surface-sunken);border:1px solid var(--border-subtle)">
      <div class="name">Sunken</div><div class="val">--surface-sunken</div>
    </div>
    <div class="stack">
      <div class="borderbox" style="border:1px solid var(--border-subtle)"><span class="lbl">border-subtle · 200</span></div>
      <div class="borderbox" style="border:1px solid var(--border-strong)"><span class="lbl">border-strong · 300</span></div>
      <div class="borderbox" style="border:1.5px solid var(--border-accent)"><span class="lbl">border-accent · teal</span></div>
    </div>
  </div>
</body>
</html>
