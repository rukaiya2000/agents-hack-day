<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4px base grid. Compact, aligned, generous only where it aids scanning." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--accent-tint-2); border: 1px solid var(--teal-300); border-radius: var(--radius-xs); width: 22px; }
  .n { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-tertiary); }
  .px { font-size: var(--text-xs); font-weight: 600; color: var(--text-primary); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="px">4</div><div class="n">1</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="px">8</div><div class="n">2</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="px">12</div><div class="n">3</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="px">16</div><div class="n">4</div></div>
    <div class="item"><div class="bar" style="height:20px"></div><div class="px">20</div><div class="n">5</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="px">24</div><div class="n">6</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="px">32</div><div class="n">8</div></div>
    <div class="item"><div class="bar" style="height:40px"></div><div class="px">40</div><div class="n">10</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="px">48</div><div class="n">12</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="px">64</div><div class="n">16</div></div>
  </div>
</body>
</html>
