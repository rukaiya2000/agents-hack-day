<!-- @dsCard group="Brand" viewport="700x210" name="Logo & lockup" subtitle="Aperture mark + wordmark. Clear space = mark height. Teal on light, white on ink." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-card); display:flex; }
  .panel { flex:1; display:flex; align-items:center; gap:24px; padding:30px 28px; }
  .dark { background: var(--slate-950); }
  .lockup { display:flex; align-items:center; gap:11px; }
  .lockup img { width:34px; height:34px; }
  .wm { display:flex; flex-direction:column; line-height:1.1; }
  .wm .a { font-family: var(--font-sans); font-weight:600; font-size:16px; letter-spacing:-.01em; color: var(--text-primary); }
  .wm .b { font-family: var(--font-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color: var(--text-tertiary); margin-top:2px; }
  .dark .wm .a { color:#fff; }
  .dark .wm .b { color: var(--teal-300); }
  .markonly img { width:48px; height:48px; }
</style>
</head>
<body>
  <div class="panel">
    <div class="lockup">
      <img src="../assets/logo-mark.svg" alt="">
      <div class="wm"><span class="a">Medical&nbsp;Affairs Copilot</span><span class="b">Scientific Intelligence</span></div>
    </div>
  </div>
  <div class="panel dark">
    <div class="markonly"><img src="../assets/logo-mark.svg" alt=""></div>
    <div class="lockup">
      <img src="../assets/logo-mark.svg" alt="">
      <div class="wm"><span class="a">Medical&nbsp;Affairs Copilot</span><span class="b">Scientific Intelligence</span></div>
    </div>
  </div>
</body>
</html>
