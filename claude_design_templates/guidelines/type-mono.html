<!-- @dsCard group="Type" viewport="700x215" name="Mono — Plex Mono" subtitle="Scores, IDs, citation refs, audit timestamps — anything comparable or quotable." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); font-family: var(--font-mono); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .line:last-child { border-bottom: 0; }
  .spec { font-size: var(--text-2xs); color: var(--text-tertiary); width: 130px; flex: none; }
  .samp { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="line"><span class="spec">4xl · 40 · 500 score</span><span class="samp" style="font-size:40px;font-weight:500;letter-spacing:-.01em">92.4</span></div>
  <div class="line"><span class="spec">eyebrow · 11 · caps</span><span class="ds-eyebrow">PROTOCOL · NCT0•••••• · PHASE 3</span></div>
  <div class="line"><span class="spec">ref · 12</span><span class="samp" style="font-size:12px;color:var(--evidence-ink)">[NEJM 2024] · [Lancet ID 2023] · [CID 2022]</span></div>
  <div class="line"><span class="spec">audit · 10</span><span class="samp" style="font-size:10px;color:var(--text-secondary)">2026-06-04 14:22:08Z · brief.v3 · firewall=on</span></div>
</body>
</html>
