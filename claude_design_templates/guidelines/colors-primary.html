<!-- @dsCard group="Colors" viewport="700x190" name="Primary — Teal" subtitle="Deep clinical teal. The single brand accent; used sparingly for primary action & focus." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; }
  .chip { height: 72px; border-radius: var(--radius-md); border: 1px solid rgba(19,26,28,.06); }
  .meta { margin-top: 8px; }
  .name { font-size: var(--text-sm); font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--text-tertiary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--teal-50)"></div><div class="meta"><div class="name">teal-50</div><div class="val">#e4f2f2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-100)"></div><div class="meta"><div class="name">teal-100</div><div class="val">#c3e3e4</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-500)"></div><div class="meta"><div class="name">teal-500</div><div class="val">#128a92</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-600);box-shadow:inset 0 0 0 2px var(--text-primary)"></div><div class="meta"><div class="name">teal-600 · accent</div><div class="val">#0e7178</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--teal-700)"></div><div class="meta"><div class="name">teal-700 · hover</div><div class="val">#0a565c</div></div></div>
  </div>
</body>
</html>
