<!-- @dsCard group="Type" viewport="700x230" name="Body & UI — Plex Sans" subtitle="Dense enterprise UI text. 13px default; 11px mono-style eyebrows." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); font-family: var(--font-sans); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .line:last-child { border-bottom: 0; }
  .spec { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-tertiary); width: 130px; flex: none; }
  .samp { color: var(--text-primary); }
</style>
</head>
<body>
  <div class="line"><span class="spec">md · 14 · 500</span><span class="samp" style="font-size:14px;font-weight:500">Infectious disease & vaccinology specialists</span></div>
  <div class="line"><span class="spec">base · 13 · 400</span><span class="samp" style="font-size:13px">Default UI and body copy. Scientifically relevant, evidence-supported expert intelligence.</span></div>
  <div class="line"><span class="spec">sm · 12 · 400</span><span class="samp" style="font-size:12px;color:var(--text-secondary)">Secondary metadata, captions and helper text.</span></div>
  <div class="line"><span class="spec">xs · 11 · 500</span><span class="ds-eyebrow">Non-promotional scientific exchange</span></div>
</body>
</html>
