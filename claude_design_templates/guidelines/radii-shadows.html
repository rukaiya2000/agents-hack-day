<!-- @dsCard group="Spacing" viewport="700x175" name="Radii & shadows" subtitle="Small clinical corners. Shadows are whisper-quiet — reserved for true overlays." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-canvas); display:flex; gap:36px; }
  .grp { display:flex; gap:14px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:9px; }
  .box { width:56px; height:56px; background: var(--surface-card); border:1px solid var(--border-subtle); }
  .lbl { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-tertiary); }
  .lbl b { display:block; color: var(--text-primary); font-size: var(--text-xs); }
  .divider { width:1px; background: var(--border-subtle); }
</style>
</head>
<body>
  <div class="grp">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lbl"><b>xs</b>3px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl"><b>sm</b>5px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl"><b>md</b>7px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl"><b>lg</b>10px</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lbl"><b>pill</b>999</div></div>
  </div>
  <div class="divider"></div>
  <div class="grp">
    <div class="col"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-xs);border-color:transparent"></div><div class="lbl"><b>xs</b></div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-sm);border-color:transparent"></div><div class="lbl"><b>sm</b></div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-md);border-color:transparent"></div><div class="lbl"><b>md</b></div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md);box-shadow:var(--shadow-overlay);border-color:transparent"></div><div class="lbl"><b>overlay</b></div></div>
  </div>
</body>
</html>
