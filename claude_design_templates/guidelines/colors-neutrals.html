<!-- @dsCard group="Colors" viewport="700x190" name="Neutrals — Slate" subtitle="Cool charcoal-to-off-white slate ramp. Carries ~90% of the interface." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 72px; border-radius: var(--radius-md); border: 1px solid rgba(19,26,28,.08); }
  .meta { margin-top: 8px; }
  .name { font-size: var(--text-xs); font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-tertiary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--slate-950)"></div><div class="meta"><div class="name">950 · ink</div><div class="val">#131a1c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-700)"></div><div class="meta"><div class="name">700</div><div class="val">#3a484c</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-500)"></div><div class="meta"><div class="name">500 · 2nd</div><div class="val">#647379</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><div class="meta"><div class="name">400 · 3rd</div><div class="val">#8b989e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-300)"></div><div class="meta"><div class="name">300 · bd</div><div class="val">#c4ced2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-200)"></div><div class="meta"><div class="name">200 · bd</div><div class="val">#e0e6e8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-100)"></div><div class="meta"><div class="name">100</div><div class="val">#edf1f2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--slate-50)"></div><div class="meta"><div class="name">50 · bg</div><div class="val">#f4f7f8</div></div></div>
  </div>
</body>
</html>
