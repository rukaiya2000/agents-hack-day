<!-- @dsCard group="Type" viewport="700x230" name="Display & headings — Plex Sans" subtitle="Tightly tracked IBM Plex Sans for titles and screen headers." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); font-family: var(--font-sans); }
  .line { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--border-subtle); }
  .line:last-child { border-bottom: 0; }
  .spec { font-family: var(--font-mono); font-size: var(--text-2xs); color: var(--text-tertiary); width: 130px; flex: none; }
  .samp { color: var(--text-primary); letter-spacing: var(--tracking-tight); }
</style>
</head>
<body>
  <div class="line"><span class="spec">3xl · 30 · 600</span><span class="samp" style="font-size:30px;font-weight:600">Protocol-aware intelligence</span></div>
  <div class="line"><span class="spec">2xl · 24 · 600</span><span class="samp" style="font-size:24px;font-weight:600">Ranked expert evidence</span></div>
  <div class="line"><span class="spec">xl · 20 · 600</span><span class="samp" style="font-size:20px;font-weight:600">Score breakdown & rationale</span></div>
  <div class="line"><span class="spec">lg · 16 · 600</span><span class="samp" style="font-size:16px;font-weight:600;letter-spacing:var(--tracking-snug)">Generate MSL pre-call brief</span></div>
</body>
</html>
